server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 25M;

  # Use Docker's embedded DNS so the upstream is resolved at request time,
  # not at nginx startup. Without this, nginx crashes if `api` isn't
  # resolvable the moment the container starts.
  resolver 127.0.0.11 valid=10s ipv6=off;

  location /api/ {
    set $upstream_api api:4000;
    proxy_pass http://$upstream_api$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
