services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pnl}
      POSTGRES_USER: ${POSTGRES_USER:-pnl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pnl} -d ${POSTGRES_DB:-pnl}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pnl}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-pnl}
      PORT: 4000
      TZ: ${TZ:-America/New_York}
      GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID:-}
      GOOGLE_SHEET_RANGE: ${GOOGLE_SHEET_RANGE:-}
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/google.json
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

  backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    user: postgres:postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-pnl}
      POSTGRES_USER: ${POSTGRES_USER:-pnl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
